<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>С Днём Рождения!</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      color: #fff;
    }
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, #ff9a9e, #fad0c4, #fbc2eb, #a18cd1, #fbc2eb);
      background-size: 400% 400%;
      animation: gradientMove 20s ease infinite;
      z-index: -1;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      padding: 60px 20px;
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: 60px;
      margin-bottom: 30px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
    }

    .photo {
      width: 320px;
      height: auto;
      border-radius: 20px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.4);
      border: 4px solid white;
      margin-bottom: 30px;
    }

    p {
      font-size: 26px;
      max-width: 700px;
      margin: 0 auto;
      line-height: 1.6;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
    }

    @media (max-width: 500px) {
      h1 {
        font-size: 36px;
      }
      .photo {
        width: 90%;
      }
      p {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Happy birthday,Jakosh!</h1>
    <img src="gg.jpeg" alt="Фото" class="photo">
    <p>Пусть твой день рождения будет ярким! Желаю любви, счастья, улыбок и вдохновения каждый день!</p>
  </div>
</body>
</html>
